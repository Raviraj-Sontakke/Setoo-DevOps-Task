trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/*
      - "*.md"

pr:
  branches:
    include:
      - main

variables:
  imageTag: $(Build.SourceVersion)
  acrLoginServer: ravirajacr.azurecr.io
  acrServiceConnection: raviraj-acr-connection

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: "Build & Push Images"
    jobs:
      - job: BuildImages
        displayName: "Build container images"
        steps:
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: $(acrServiceConnection)

          - template: templates/build-push.yml
            parameters:
              imageName: frontend
              dockerfilePath: docker/frontend/Dockerfile
              buildContext: docker/frontend
              acrLoginServer: $(acrLoginServer)
              imageTag: $(imageTag)

          - template: templates/build-push.yml
            parameters:
              imageName: backend
              dockerfilePath: docker/backend/Dockerfile
              buildContext: docker/backend
              acrLoginServer: $(acrLoginServer)
              imageTag: $(imageTag)

          - template: templates/build-push.yml
            parameters:
              imageName: database
              dockerfilePath: docker/database/Dockerfile
              buildContext: docker/database
              acrLoginServer: $(acrLoginServer)
              imageTag: $(imageTag)

  - stage: Validate
    displayName: "Validate Helm Charts"
    dependsOn: Build
    jobs:
      - job: HelmLint
        displayName: "Helm lint"
        steps:
          - task: HelmInstaller@1
            inputs:
              helmVersionToInstall: "3.16.0"

          - script: |
              helm lint helm/charts/frontend
              helm lint helm/charts/backend
              helm lint helm/charts/database
            displayName: "Lint all charts"

  - stage: TerraformPlan
    displayName: "Terraform Plan"
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      azureServiceConnection: raviraj-azure-connection
    jobs:
      - job: TerraformPlanDev
        displayName: "Plan dev environment"
        steps:
          - template: templates/terraform-apply.yml
            parameters:
              environment: dev
              workingDirectory: terraform/environments/dev
              planOnly: true
