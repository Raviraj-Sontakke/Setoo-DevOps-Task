parameters:
  - name: chartPath
    type: string
  - name: releaseName
    type: string
  - name: namespace
    type: string
  - name: valuesFile
    type: string
    default: ""
  - name: overrideValues
    type: string
    default: ""
  - name: environment
    type: string

steps:
  - task: HelmDeploy@0
    displayName: "Deploy ${{ parameters.releaseName }} to ${{ parameters.environment }}"
    inputs:
      connectionType: Kubernetes Service Connection
      kubernetesServiceConnection: $(aksServiceConnection)
      namespace: ${{ parameters.namespace }}
      command: upgrade
      chartType: FilePath
      chartPath: ${{ parameters.chartPath }}
      releaseName: ${{ parameters.releaseName }}
      install: true
      waitForExecution: true
      arguments: >
        --timeout 10m0s
        ${{ if parameters.valuesFile }}--values ${{ parameters.valuesFile }}${{ end }}
        ${{ if parameters.overrideValues }}--set ${{ parameters.overrideValues }}${{ end }}
        --atomic
