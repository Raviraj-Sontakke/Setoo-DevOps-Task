airflow:
  executor: CeleryExecutor

  images:
    airflow:
      repository: apache/airflow
      tag: "2.10.3"
      pullPolicy: IfNotPresent

  config:
    core:
      load_examples: "False"
    webserver:
      expose_config: "False"

  webserver:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    service:
      type: ClusterIP

  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  workers:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilization: 70

  triggerer:
    enabled: true
    replicas: 1

  flower:
    enabled: false

  logs:
    persistence:
      enabled: true
      size: 20Gi
      storageClassName: managed-premium

  dags:
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: managed-premium

  postgresql:
    enabled: true
    primary:
      persistence:
        enabled: true
        size: 20Gi

  redis:
    enabled: true

  ingress:
    web:
      enabled: true
      ingressClassName: nginx
      host: airflow.raviraj.local
